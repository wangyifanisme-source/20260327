                const over = (e) => { if (e.target.tagName === 'A' || e.target.tagName === 'BUTTON' || e.target.closest('.cursor-pointer')) setHover(true); };
                const out = () => setHover(false);
                const down = () => setClick(true); const up = () => setClick(false);
                document.addEventListener('mousemove', move); document.addEventListener('mouseover', over); document.addEventListener('mouseout', out);
                document.addEventListener('mousedown', down); document.addEventListener('mouseup', up);
                return () => { document.removeEventListener('mousemove', move); document.removeEventListener('mouseover', over); document.removeEventListener('mouseout', out); document.removeEventListener('mousedown', down); document.removeEventListener('mouseup', up); };
            }, []);
            return (<><div className="custom-cursor cursor-dot" style={{ left: pos.x, top: pos.y }} /><div className={`custom-cursor cursor-ring ${hover ? 'hover' : ''} ${click ? 'click' : ''}`} style={{ left: pos.x, top: pos.y }} /></>);

        // 横向滑动模块（Marketing webpage design、包装设计、LOGO设计）优化自动轮播平滑滚动
        const HorizontalSwipeSection = ({ section, onItemClick }) => {
            const scrollRef = useRef(null);
            const timerRef = useRef(null);
            const resetTimer = () => {
                if (timerRef.current) clearInterval(timerRef.current);
                timerRef.current = setInterval(() => {
                    if (!scrollRef.current) return;
                    const container = scrollRef.current;
                    const slideWidth = container.querySelector('.swiper-slide')?.offsetWidth || 320;
                    const gap = 24;
                    const scrollAmount = slideWidth + gap;
                    const maxScroll = container.scrollWidth - container.clientWidth;
                    let newScrollLeft = container.scrollLeft + scrollAmount;
                    if (newScrollLeft >= maxScroll - 5) {
                        container.scrollTo({ left: 0, behavior: 'smooth' });
                    } else {
                        container.scrollTo({ left: newScrollLeft, behavior: 'smooth' });
                    }
                }, 5000);
            };
            useEffect(() => {
                resetTimer();
                const container = scrollRef.current;
                const handleUserScroll = () => {
                    if (timerRef.current) clearInterval(timerRef.current);
                    timerRef.current = setInterval(() => {
                        if (!scrollRef.current) return;
                        const slideWidth = scrollRef.current.querySelector('.swiper-slide')?.offsetWidth || 320;
                        const gap = 24;
                        const scrollAmount = slideWidth + gap;
                        const maxScroll = scrollRef.current.scrollWidth - scrollRef.current.clientWidth;
                        let newScrollLeft = scrollRef.current.scrollLeft + scrollAmount;
                        if (newScrollLeft >= maxScroll - 5) {
                            scrollRef.current.scrollTo({ left: 0, behavior: 'smooth' });
                        } else {
                            scrollRef.current.scrollTo({ left: newScrollLeft, behavior: 'smooth' });
                        }
                    }, 5000);
                };
                if (container) {
                    container.addEventListener('scroll', handleUserScroll);
                    container.addEventListener('touchstart', handleUserScroll);
                }
                return () => {
                    if (timerRef.current) clearInterval(timerRef.current);
                    if (container) {
                        container.removeEventListener('scroll', handleUserScroll);
                        container.removeEventListener('touchstart', handleUserScroll);
                    }
                };
            }, []);
            const handleArrowClick = (direction) => {
                if (timerRef.current) clearInterval(timerRef.current);
                if (direction === 'left') scrollRef.current?.scrollBy({ left: -320, behavior: 'smooth' });
                else scrollRef.current?.scrollBy({ left: 320, behavior: 'smooth' });
                resetTimer();
            };
            return (<section className="py-24 px-6 border-b border-white/5"><div className="max-w-7xl mx-auto"><div className="mb-12"><h2 className="text-4xl md:text-5xl font-bold text-white mb-3">{section.title}</h2><p className="text-zinc-400 text-lg">{section.subtitle}</p></div><div className="relative"><div ref={scrollRef} className="swiper-container"><div className="swiper-wrapper">{section.items.map(item => (<div key={item.id} className="swiper-slide"><div className="group relative rounded-xl overflow-hidden cursor-pointer hover-lift" onClick={() => onItemClick(item)}><img src={item.images[0]} alt={item.title} className="w-full h-full object-cover aspect-[16/9]" loading="lazy" /><div className="image-overlay absolute inset-0 flex flex-col justify-end p-6"><h3 className="text-xl font-bold text-white mb-1">{item.title}</h3><p className="text-white/70 text-sm">{item.subtitle}</p></div></div></div>))}</div></div><button onClick={() => handleArrowClick('left')} className="swiper-nav-btn left"><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" /></svg></button><button onClick={() => handleArrowClick('right')} className="swiper-nav-btn right"><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" /></svg></button></div></div></section>);
        };

        };

        // Banner 模块 - 无自动轮播，添加淡入淡出效果
        const BannerSection = ({ section, onImageClick }) => {
            const allImages = section.items.flatMap(item =>
                item.images.map(imgUrl => ({
                    url: imgUrl,
                    title: item.title,
                    subtitle: item.subtitle,
                    description: item.description
                }))
            );
            const [currentIdx, setCurrentIdx] = useState(0);
            const [fade, setFade] = useState(false);
            const [touchStart, setTouchStart] = useState(null);
            const [touchEnd, setTouchEnd] = useState(null);

            const prev = () => {
                setFade(true);
                setTimeout(() => {
                    setCurrentIdx((prev) => (prev - 1 + allImages.length) % allImages.length);
                    setFade(false);
                }, 200);
            };
            const next = () => {
                setFade(true);
                setTimeout(() => {
                    setCurrentIdx((prev) => (prev + 1) % allImages.length);
                    setFade(false);
                }, 200);
            };

            const handleTouchStart = (e) => { setTouchStart(e.targetTouches[0].clientX); };
            const handleTouchMove = (e) => { setTouchEnd(e.targetTouches[0].clientX); };
            const handleTouchEnd = () => {
                if (!touchStart || !touchEnd) return;
                const distance = touchEnd - touchStart;
                const threshold = 50;
                if (Math.abs(distance) > threshold) {
                    if (distance > 0) prev();
                    else next();
                }
                setTouchStart(null);
                setTouchEnd(null);
            };

            const current = allImages[currentIdx];
            const handleClick = () => {
                const fakeItem = {
                    id: `banner-${currentIdx}`,
                    title: section.title,
                    subtitle: current.subtitle,
                    description: current.description || "Banner设计",
                    images: allImages.map(img => img.url)
                };
                onImageClick(fakeItem);
            };
            return (
                <section className="py-12 px-6 border-b border-white/5">
                    <div className="max-w-7xl mx-auto">
                        <div className="mb-8">
                            <h2 className="text-4xl md:text-5xl font-bold text-white mb-3">{section.title}</h2>
                            <p className="text-zinc-400 text-lg">{section.subtitle}</p>
                        </div>
                        <div
                            className="banner-container"
                            onTouchStart={handleTouchStart}
                            onTouchMove={handleTouchMove}
                            onTouchEnd={handleTouchEnd}
                        >
                            <img src={current.url} alt={current.title} className={`banner-image ${fade ? 'fade-out' : ''}`} onClick={handleClick} loading="lazy" />
                            {allImages.length > 1 && (
                                <>
                                    <button onClick={prev} className="banner-arrow left" aria-label="上一张">
                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" /></svg>
                                    </button>
                                    <button onClick={next} className="banner-arrow right" aria-label="下一张">
                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" /></svg>
                                    </button>
                                </>
                            )}
                            <div className="absolute bottom-4 left-1/2 -translate-x-1/2 bg-black/60 text-white px-3 py-1 rounded-full text-xs pointer-events-none">
                                {currentIdx+1} / {allImages.length}
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        // 瀑布流模块 - 移除每张图片底部的黑色渐变层
        const WaterfallSection = ({ images, onImageClick }) => {
            const [visible, setVisible] = useState(12);
            const loadMore = () => setVisible(p => Math.min(p+12, images.length));
            const displayed = images.slice(0, visible);
            return (<section className="py-24 px-6 border-b border-white/5"><div className="max-w-7xl mx-auto"><div className="mb-12"><h2 className="text-4xl md:text-5xl font-bold text-white mb-3">更多作品</h2><p className="text-zinc-400 text-lg">浏览更多设计细节，点击图片查看大图</p></div><div className="waterfall-grid">{displayed.map(img => (<div key={img.id} className="waterfall-item group" onClick={() => onImageClick({ id: img.id, title: img.title, subtitle: img.subtitle, description: img.subtitle, images: [img.src] })}><img src={img.src} alt={img.title} className="transition-transform group-hover:scale-105" loading="lazy" /><div className="overlay"><h3 className="text-white font-medium text-sm">{img.title}</h3><p className="text-white/70 text-xs">{img.subtitle}</p></div><div className="absolute top-3 right-3 w-8 h-8 rounded-full bg-black/50 text-white flex items-center justify-center opacity-0 group-hover:opacity-100"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" /></svg></div></div>))}</div>{visible < images.length && <div className="flex justify-center mt-12"><button onClick={loadMore} className="px-8 py-3 rounded-full bg-gradient-to-r from-neon-blue to-neon-purple text-white font-medium hover:shadow-lg transition-all">加载更多</button></div>}</div></section>);
        };

        const FooterMessage = () => (<footer className="footer-message"><h3>感谢您的关注</h3><p>感谢您抽时间浏览我的作品，期待贵公司的面试机会。<br />请联系我：<span className="contact-highlight">{SITE_CONFIG.contactPhone}</span></p><p>感谢！</p></footer>);
        const Footer = () => (<footer className="py-8 px-6 border-t border-white/5 text-center"><p className="text-zinc-500 text-sm">{FOOTER_TEXT}</p></footer>);

        const App = () => {
            const [selectedItem, setSelectedItem] = useState(null);
            const [modalOpen, setModalOpen] = useState(false);
            const [activeCat, setActiveCat] = useState('All');
            const cats = ['All', ...WORK_SECTIONS.map(s => s.id)];
            const filtered = activeCat === 'All' ? WORK_SECTIONS : WORK_SECTIONS.filter(s => s.id === activeCat);
            const handleItemClick = (item) => { setSelectedItem(item); setModalOpen(true); };
            const useHorizontalSwipe = (sec) => sec.id === 'webdesign' || sec.id === 'packaging' || sec.id === 'logo';
            const isBanner = (sec) => sec.id === 'banner';
            const getWorkSectionProps = (sec) => {
                if (sec.id === 'corporate') {
                    return { aspectRatio: 'aspect-[16/9]' };
                }
                return { aspectRatio: 'aspect-[3/4]' };
            };

            return (<div><CustomCursor /><Navbar /><Hero /><main id="work"><div className="max-w-7xl mx-auto px-6 py-8"><div className="flex justify-center gap-3 flex-wrap">{cats.map(c => (<button key={c} onClick={() => setActiveCat(c)} className={`category-tab px-6 py-2 rounded-lg text-sm font-syne cursor-pointer ${activeCat === c ? 'active' : 'bg-zinc-800/50 text-zinc-400'}`}>{c === 'All' ? '全部作品' : (WORK_SECTIONS.find(s => s.id === c)?.title || c)}</button>))}</div></div>{filtered.map(sec => { if (isBanner(sec)) return <BannerSection key={sec.id} section={sec} onImageClick={handleItemClick} />; else if (useHorizontalSwipe(sec)) return <HorizontalSwipeSection key={sec.id} section={sec} onItemClick={handleItemClick} />; else return <WorkSection key={sec.id} section={sec} onItemClick={handleItemClick} {...getWorkSectionProps(sec)} />; })}<WaterfallSection images={WATERFALL_IMAGES} onImageClick={handleItemClick} /></main><FooterMessage /><Footer /><ProjectModal item={selectedItem} isOpen={modalOpen} onClose={() => setModalOpen(false)} /></div>);
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
