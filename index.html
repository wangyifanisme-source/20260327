        body {

        /* Custom Cursor */
        .custom-cursor {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.15s ease-out, opacity 0.15s ease-out;
        }

        .cursor-dot {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }

        .cursor-ring {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(0, 212, 255, 0.8);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.3s ease, height 0.3s ease, border-color 0.3s ease;
        }

        .cursor-ring.hover {
            width: 60px;
            height: 60px;
            border-color: rgba(168, 85, 247, 0.8);
        }

        .cursor-ring.click {
            transform: translate(-50%, -50%) scale(0.8);
        }

        /* Hide default cursor on desktop */

            body {
                cursor: auto;
            }
            .custom-cursor {

            }
        }

        /* Custom Scrollbar */

        .glass-effect {
            background: rgba(15, 15, 20, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .gradient-text {
            background: linear-gradient(135deg, #00d4ff, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hover-lift {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .hover-lift:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 212, 255, 0.2);
        }

        .image-overlay {
            background: linear-gradient(to top, rgba(0, 0, 0, 0.85) 0%, rgba(0, 0, 0, 0.6) 30%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .gallery-item:hover .image-overlay {
            opacity: 1;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        /* Modal Styles */
        .modal-backdrop {
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
        }

        .carousel-slide {
            transition: opacity 0.5s ease-in-out;
        }

        /* Grid Pattern Background */
        .grid-bg {
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* Font utilities */
        .font-syne {
            font-family: 'Syne', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* Gallery Grid System */
        .gallery-grid {
            display: grid;
            gap: 1.5rem;
        }

        .gallery-grid.one-col {
            grid-template-columns: 1fr;
        }

        .gallery-grid.two-col {
            grid-template-columns: repeat(2, 1fr);
        }

        .gallery-grid.three-col {
            grid-template-columns: repeat(3, 1fr);
        }

        @media (max-width: 1024px) {
            .gallery-grid.three-col {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* 优化1：手机端显示2列 */
        @media (max-width: 640px) {
            .gallery-grid.two-col,
            .gallery-grid.three-col {
                grid-template-columns: repeat(2, 1fr);
                gap: 0.75rem;
            }

            .gallery-grid.one-col {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Category Tab Styles */
        .category-tab {
            transition: all 0.3s ease;
        }

        .category-tab.active {
            background: linear-gradient(135deg, #00d4ff, #a855f7);
            color: white;
        }

        .category-tab:not(.active):hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* 优化2：瀑布流样式 - 使用 CSS Columns 实现真正的瀑布流 */
        .waterfall-grid {
            column-count: 2;
            column-gap: 1rem;
        }

        @media (min-width: 768px) {
            .waterfall-grid {
                column-count: 3;
                column-gap: 1.5rem;
            }
        }

        @media (min-width: 1024px) {
            .waterfall-grid {
                column-count: 4;
                column-gap: 1.5rem;
            }
        }

        .waterfall-item {
            position: relative;
            border-radius: 0.75rem;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease;
            margin-bottom: 1rem; /* 列内元素间距 */
            break-inside: avoid; /* 防止图片被分割到两列 */
        }

        .waterfall-item:hover {
            transform: translateY(-4px);
        }

        .waterfall-item img {
            width: 100%;
            height: auto; /* 高度自适应，保持图片原始比例 */
            object-fit: cover; /* 裁剪以适应容器，保持比例 */
            display: block;
        }

        .waterfall-item .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, transparent 100%);
            padding: 1rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .waterfall-item:hover .overlay {
            opacity: 1;
        }

            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60%;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8) 0%, transparent 100%);
            pointer-events: none;

        .arrow-btn {

        .arrow-btn:hover {
            border-color: rgba(255, 255, 255, 0.5);
            color: rgba(255, 255, 255, 1);
            transform: translateX(5px);
        }

        .arrow-btn.prev:hover {
            transform: translateX(-5px);
        }

        .arrow-btn.disabled {

            cursor: not-allowed;
            transform: none !important;
        }

            left: 0;
            right: 0;

            display: block; /* 使用普通块级布局 */
        }

        /* 图片包装器 - 实现水平居中且从顶部开始 */

            display: block; /* 使用块级布局 */
            text-align: center; /* 让内部的行内元素（img）水平居中 */
            padding: 20px 0; /* 上下留白 */
            min-height: 100%; /* 确保至少占满容器高度 */

            height: auto;
            object-fit: contain;
            display: inline-block; /* 使用行内块级元素，配合text-align: center实现居中 */
            vertical-align: top; /* 从顶部开始，不要垂直对齐 */
        }

        /* 瀑布流展开功能样式 */
        .waterfall-container {
            position: relative;
        }

            overflow: hidden;
            transition: max-height 0.5s ease;

            font-size: 1.25rem;

        // Custom Cursor Component
        const CustomCursor = () => {
            const [position, setPosition] = useState({ x: 0, y: 0 });
            const [hovered, setHovered] = useState(false);
            const [clicked, setClicked] = useState(false);

            useEffect(() => {
                const handleMouseMove = (e) => {
                    setPosition({ x: e.clientX, y: e.clientY });
                };

                const handleMouseOver = (e) => {
                    if (e.target.tagName === 'A' || e.target.tagName === 'BUTTON' || e.target.closest('.cursor-pointer')) {
                        setHovered(true);
                    }
                };

                const handleMouseOut = () => {
                    setHovered(false);
                };

                const handleMouseDown = () => setClicked(true);
                const handleMouseUp = () => setClicked(false);

                document.addEventListener('mousemove', handleMouseMove);
                document.addEventListener('mouseover', handleMouseOver);
                document.addEventListener('mouseout', handleMouseOut);
                document.addEventListener('mousedown', handleMouseDown);
                document.addEventListener('mouseup', handleMouseUp);

                return () => {
                    document.removeEventListener('mousemove', handleMouseMove);
                    document.removeEventListener('mouseover', handleMouseOver);
                    document.removeEventListener('mouseout', handleMouseOut);
                    document.removeEventListener('mousedown', handleMouseDown);
                    document.removeEventListener('mouseup', handleMouseUp);
                };
            }, []);

            return (
                <div>
                    <div
                        className="custom-cursor cursor-dot"
                        style={{ left: position.x, top: position.y }}
                    />
                    <div
                        className={`custom-cursor cursor-ring ${hovered ? 'hover' : ''} ${clicked ? 'click' : ''}`}
                        style={{ left: position.x, top: position.y }}
                    />
                </div>
            );
        };

                            >
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </section>
            );
        };

        const WorkSection = ({ section, onItemClick, forceAspectRatio }) => {
            const getGridClass = () => {
                const count = section.items.length;
                if (count === 1) return 'gallery-grid one-col';
                if (count === 2) return 'gallery-grid two-col';
                return 'gallery-grid three-col';
            };

            return (
                <section className="py-24 px-6 border-b border-white/5 last:border-0">
                    <div className="max-w-7xl mx-auto">
                        <div className="mb-12">
                            <h2 className="text-4xl md:text-5xl font-bold text-white mb-3 font-syne">
                                {section.title}
                            </h2>
                            <p className="text-zinc-400 text-lg">
                                {section.subtitle}
                            </p>
                        </div>

                        <div className={getGridClass()}>
                            {section.items.map((item, index) => (
                                <GalleryItem
                                    key={item.id}
                                    item={item}
                                    onClick={onItemClick}
                                    aspectRatio={forceAspectRatio || 'aspect-[3/4]'}
                                />
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        // 瀑布流独立模块
        const WaterfallSection = ({ images, onImageClick }) => {
            // 渐进式展开：默认3行 → 点一次增加3行 → 再点一次增加3行 → 第三次全部展开
            const [expandCount, setExpandCount] = useState(0);
            const [showAll, setShowAll] = useState(false);

            // 计算每行显示的图片数量（根据列数）
            const getItemsPerRow = () => {
                const width = window.innerWidth;
                if (width >= 1024) return 4;  // 4列
                if (width >= 768) return 3;     // 3列
                return 2;                       // 2列
            };

            const [itemsPerRow, setItemsPerRow] = useState(getItemsPerRow());

            // 监听窗口大小变化
            useEffect(() => {
                const handleResize = () => {
                    setItemsPerRow(getItemsPerRow());
                };
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            // 计算要显示的图片数量
            const getDisplayCount = () => {
                if (showAll) return images.length;
                // 每次增加3行，expandCount: 0→3行，1→6行，2→9行，3→全部
                const rowsToShow = (expandCount + 1) * 3;
                return Math.min(rowsToShow * itemsPerRow, images.length);
            };

            const displayedImages = images.slice(0, getDisplayCount());

            const handleViewMore = () => {
                if (expandCount >= 2) {
                    setShowAll(true);
                } else {
                    setExpandCount(prev => prev + 1);
                }
            };

            const isShowAllOrExpanding = showAll || expandCount > 0;

            return (
                <section className="py-24 px-6 border-b border-white/5">
                    <div className="max-w-7xl mx-auto">
                        <div className="mb-12">
                            <h2 className="text-4xl md:text-5xl font-bold text-white mb-3 font-syne">
                                更多作品
                            </h2>
                            <p className="text-zinc-400 text-lg">
                                浏览更多设计细节，点击图片查看大图
                            </p>
                        </div>

                        <div className="waterfall-grid">
                            {displayedImages.map((img) => (
                                <div
                                    key={img.id}
                                    className="waterfall-item group"
                                    onClick={() => onImageClick(img)}
                                >
                                    <img
                                        src={img.src}
                                        alt={img.title}
                                        className="transition-transform duration-300 group-hover:scale-105"
                                    />
                                    <div className="fade-mask"></div>
                                    <div className="overlay">
                                        <h3 className="text-white font-medium text-sm">{img.title}</h3>
                                        <p className="text-white/70 text-xs">{img.subtitle}</p>
                                    </div>
                                    <div className="absolute top-3 right-3 w-8 h-8 rounded-full bg-black/50 text-white flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" />
                                        </svg>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {!showAll && images.length > displayedImages.length && (
                            <div className="flex justify-center mt-12">
                                <button
                                    onClick={handleViewMore}
                                    className="px-8 py-3 rounded-full bg-gradient-to-r from-neon-blue to-neon-purple text-white font-medium hover:shadow-lg hover:shadow-neon-blue/20 transition-all cursor-pointer"
                                >
                                    查看更多作品
                                </button>
                            </div>
                        )}
                    </div>
                </section>
            );
        };

        const Footer = () => (
            <footer className="py-8 px-6 border-t border-white/5">
                <div className="max-w-7xl mx-auto text-center">
                    <p className="text-zinc-500 text-sm font-syne">
                        {FOOTER_TEXT}
                    </p>
                </div>
            </footer>
        );

        const App = () => {
            const [mounted, setMounted] = useState(false);
            const [selectedItem, setSelectedItem] = useState(null);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [activeCategory, setActiveCategory] = useState('All');

            useEffect(() => {
                setMounted(true);
            }, []);

            const handleItemClick = (item) => {
                setSelectedItem(item);
                setIsModalOpen(true);
            };

            const handleCloseModal = () => {
                setIsModalOpen(false);
                setTimeout(() => setSelectedItem(null), 300);
            };

            // 瀑布流图片点击也使用 ProjectModal，保持一致的用户体验
            const handleWaterfallImageClick = (img) => {
                // 将单张图片转换为 ProjectModal 可以识别的格式
                const waterfallItem = {
                    id: img.id,
                    title: img.title,
                    subtitle: img.subtitle,
                    description: img.subtitle,
                    images: [img.src], // 单张图片作为数组
                    viewMode: 'original' // 默认进入原始尺寸模式
                };
                setSelectedItem(waterfallItem);
                setIsModalOpen(true);
            };

            const allCategories = ['All', ...WORK_SECTIONS.map(s => s.id)];

            const filteredSections = activeCategory === 'All'
                ? WORK_SECTIONS
                : WORK_SECTIONS.filter(section => section.id === activeCategory);

            const isWebDesignSection = (section) => section.id === 'webdesign';

            if (!mounted) return null;

            return (
                <div className="min-h-screen">
                    <CustomCursor />
                    <Navbar />
                    <Hero />
                    <main id="work">
                        <div className="max-w-7xl mx-auto px-6 py-8">
                            <div className="flex justify-center gap-3 flex-wrap">
                                {allCategories.map((category) => (
                                    <button
                                        key={category}
                                        onClick={() => setActiveCategory(category)}
                                        className={`category-tab px-6 py-2 rounded-lg text-sm font-syne cursor-pointer ${
                                            activeCategory === category
                                                ? 'active'
                                                : 'bg-zinc-800/50 text-zinc-400'
                                        }`}
                                    >
                                        {category === 'All' ? '全部作品' : WORK_SECTIONS.find(s => s.id === category)?.title || category}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {filteredSections.map((section, index) => (
                            isWebDesignSection(section) ? (
                                <HorizontalSwipeSection
                                    key={section.id}
                                    section={section}
                                    onItemClick={handleItemClick}
                                />
                            ) : (
                                <WorkSection
                                    key={section.id}
                                    section={section}
                                    onItemClick={handleItemClick}
                                    forceAspectRatio={'aspect-[3/4]'}
                                />
                            )
                        ))}

                        <WaterfallSection
                            images={WATERFALL_IMAGES}
                            onImageClick={handleWaterfallImageClick}
                        />
                    </main>
                    <Footer />

                    <ProjectModal
                        item={selectedItem}
                        isOpen={isModalOpen}
                        onClose={handleCloseModal}
                    />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
