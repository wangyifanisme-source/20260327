        // Custom Cursor Component
        const CustomCursor = () => {
            const [position, setPosition] = useState({ x: 0, y: 0 });
            const [hovered, setHovered] = useState(false);
            const [clicked, setClicked] = useState(false);

            useEffect(() => {
                const handleMouseMove = (e) => {
                    setPosition({ x: e.clientX, y: e.clientY });
                };

                const handleMouseOver = (e) => {
                    if (e.target.tagName === 'A' || e.target.tagName === 'BUTTON' || e.target.closest('.cursor-pointer')) {
                        setHovered(true);
                    }
                };

                const handleMouseOut = () => {
                    setHovered(false);
                };

                const handleMouseDown = () => setClicked(true);
                const handleMouseUp = () => setClicked(false);

                document.addEventListener('mousemove', handleMouseMove);
                document.addEventListener('mouseover', handleMouseOver);
                document.addEventListener('mouseout', handleMouseOut);
                document.addEventListener('mousedown', handleMouseDown);
                document.addEventListener('mouseup', handleMouseUp);

                return () => {
                    document.removeEventListener('mousemove', handleMouseMove);
                    document.removeEventListener('mouseover', handleMouseOver);
                    document.removeEventListener('mouseout', handleMouseOut);
                    document.removeEventListener('mousedown', handleMouseDown);
                    document.removeEventListener('mouseup', handleMouseUp);
                };
            }, []);

            return (
                <div>
                    <div
                        className="custom-cursor cursor-dot"
                        style={{ left: position.x, top: position.y }}
                    />
                    <div
                        className={`custom-cursor cursor-ring ${hovered ? 'hover' : ''} ${clicked ? 'click' : ''}`}
                        style={{ left: position.x, top: position.y }}
                    />
                </div>
            );
        };

                            <button
                                onClick={onClose}
                                className="w-10 h-10 rounded-full bg-black/50 text-white hover:bg-black/70 transition-colors flex items-center justify-center cursor-pointer"
                            >
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                </svg>
                            </button>
                        </div>

                        {/* Modal Body - Scrollable */}
                        <div className="flex-1 overflow-y-auto">
                            {/* 优化3：高度自适应的图片容器 */}
                            <div className="relative w-full bg-black flex items-center justify-center min-h-[300px]">
                                <img
                                    src={item.images[currentIndex]}
                                    alt={`${item.title} - Image ${currentIndex + 1}`}
                                    className="max-w-full max-h-[70vh] object-contain carousel-slide"
                                    style={{ maxHeight: '70vh' }}
                                />

                                {item.images.length > 1 && (
                                    <div>
                                        <button
                                            onClick={prevImage}
                                            className="absolute left-4 top-1/2 -translate-y-1/2 w-12 h-12 rounded-full bg-black/50 text-white hover:bg-black/70 transition-colors flex items-center justify-center cursor-pointer"
                                        >
                                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" />
                                            </svg>
                                        </button>
                                        <button
                                            onClick={nextImage}
                                            className="absolute right-4 top-1/2 -translate-y-1/2 w-12 h-12 rounded-full bg-black/50 text-white hover:bg-black/70 transition-colors flex items-center justify-center cursor-pointer"
                                        >
                                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />
                                            </svg>
                                        </button>

                                        <div className="absolute bottom-4 left-1/2 -translate-x-1/2 px-4 py-2 rounded-full bg-black/70 text-white text-sm">
                                            {currentIndex + 1} / {item.images.length}
                                        </div>
                                    </div>
                                )}
                            </div>

                            <div className="p-8">
                                <p className="text-zinc-300 leading-relaxed text-lg">
                                    {item.description}
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const GalleryItem = ({ item, onClick }) => (
            <div
                className="gallery-item group relative rounded-xl overflow-hidden cursor-pointer hover-lift"
                onClick={() => onClick(item)}
            >
                <img
                    src={item.images[0]}
                    alt={item.title}
                    className="w-full h-full object-cover transition-transform duration-500 aspect-[3/4]"
                />
                <div className="image-overlay absolute inset-0 flex flex-col justify-end p-6">
                    <h3 className="text-xl font-bold text-white mb-1 font-syne">{item.title}</h3>
                    <p className="text-white/70 text-sm">{item.subtitle}</p>
                </div>
                <div className="absolute top-3 right-3 w-8 h-8 rounded-full bg-white/20 text-white flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" />
                    </svg>
                </div>
            </div>
        );

        const WorkSection = ({ section, onItemClick }) => {
            const getGridClass = () => {
                const count = section.items.length;
                if (count === 1) return 'gallery-grid one-col';
                if (count === 2) return 'gallery-grid two-col';
                return 'gallery-grid three-col';
            };

            return (
                <section className="py-24 px-6 border-b border-white/5 last:border-0">
                    <div className="max-w-7xl mx-auto">
                        <div className="mb-12">
                            <h2 className="text-4xl md:text-5xl font-bold text-white mb-3 font-syne">
                                {section.title}
                            </h2>
                            <p className="text-zinc-400 text-lg">
                                {section.subtitle}
                            </p>
                        </div>

                        <div className={getGridClass()}>
                            {section.items.map((item, index) => (
                                <GalleryItem
                                    key={item.id}
                                    item={item}
                                    onClick={onItemClick}
                                />
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const Footer = () => (
            <footer className="py-8 px-6 border-t border-white/5">
                <div className="max-w-7xl mx-auto text-center">
                    <p className="text-zinc-500 text-sm font-syne">
                        {FOOTER_TEXT}
                    </p>
                </div>
            </footer>
        );

        const App = () => {
            const [mounted, setMounted] = useState(false);
            const [selectedItem, setSelectedItem] = useState(null);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [activeCategory, setActiveCategory] = useState('All');

            useEffect(() => {
                setMounted(true);
            }, []);

            const handleItemClick = (item) => {
                setSelectedItem(item);
                setIsModalOpen(true);
            };

            const handleCloseModal = () => {
                setIsModalOpen(false);
                setTimeout(() => setSelectedItem(null), 300);
            };

            // 获取分类列表
            const allCategories = ['All', ...WORK_SECTIONS.map(s => s.id)];

            // 过滤显示的分类
            const filteredSections = activeCategory === 'All'
                ? WORK_SECTIONS
                : WORK_SECTIONS.filter(section => section.id === activeCategory);

            if (!mounted) return null;

            return (
                <div className="min-h-screen">
                    <CustomCursor />
                    <Navbar />
                    <Hero />
                    <main id="work">
                        {/* Category Filter */}
                        <div className="max-w-7xl mx-auto px-6 py-8">
                            <div className="flex justify-center gap-3 flex-wrap">
                                {allCategories.map((category) => (
                                    <button
                                        key={category}
                                        onClick={() => setActiveCategory(category)}
                                        className={`category-tab px-6 py-2 rounded-lg text-sm font-syne cursor-pointer ${
                                            activeCategory === category
                                                ? 'active'
                                                : 'bg-zinc-800/50 text-zinc-400'
                                        }`}
                                    >
                                        {category === 'All' ? '全部作品' : WORK_SECTIONS.find(s => s.id === category)?.title || category}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Work Sections */}
                        {filteredSections.map((section, index) => (
                            <WorkSection
                                key={section.id}
                                section={section}
                                onItemClick={handleItemClick}
                            />
                        ))}
                    </main>
                    <Footer />

                    <ProjectModal
                        item={selectedItem}
                        isOpen={isModalOpen}
                        onClose={handleCloseModal}
                    />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
